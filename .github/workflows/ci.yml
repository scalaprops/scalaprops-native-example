name: CI
on:
  pull_request:
  push:
jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 50
    strategy:
      fail-fast: false
    steps:
    - uses: actions/checkout@v6
    - uses: actions/setup-java@v5
      with:
        java-version: 17
        distribution: temurin
    - uses: coursier/cache-action@v8
    - uses: sbt/setup-sbt@v1
    - run: sbt -v --server "+ run" "+ test"
    - run: find . -type f -name scalaprops-native-example-test
    - run: ./target/out/native0.5/scala-2.13.18/scalaprops-native-example/scalaprops-native-example-test
    - run: ./target/out/native0.5/scala-3.8.3/scalaprops-native-example/scalaprops-native-example-test
